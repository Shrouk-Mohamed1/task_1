<!DOCTYPE html>
<head>
    <title>Doctor Appoinment Form</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="item">
        <img src="images/doctor.jpg" alt="doctor">
    </div>
    <div class="item">
        <form>
            <h1>Doctor Appoinment Form</h1>
            <div class="line"></div>
            <br>
            <br>
            <div class="labels">
                <label>Appoinment<br> Date</label>
            </div>
            <div class="inputs">
                <input type="date" name="appoinment_date">
            </div>
            <br>
            <br>
            <div class="labels">
                <label>Appoinment<br>Time</label>
            </div>
            <div class="inputs">
                <input type="time" name="appoinment_time">
            </div>
            <br>
            <br>
            <div class="labels">
                <label>Name</label>
            </div>
            <div class="inputs">
                <input type="text" name="first_name" placeholder="First">
                <input type="text" name="last_name" placeholder="Last">
            </div>
            <br>
            <br>
            <div class="labels">
                <label>Gender</label>
            </div>
            <div class="inputs">
                <span>Male</span>
                <input type="radio" name="gender" value="Male">
                <span>Female</span>
                <input type="radio" name="gender" value="Female">
            </div>
            <br>
            <br>
            <div class="labels">
                <label>Phone</label>
            </div>
            <div class="inputs">
                <input type="tel" name="phone" placeholder="###">
            </div>
            <br>
            <br>
            <div class="labels">
                <label>Address</label>
            </div>
            <div class="inputs">
                <input type="text" name="city" placeholder="City">
                <input type="text" name="State" placeholder="State">
            </div>
            <br>
            <br>
            <div class="labels ">
                <label class="your">Your Query</label>
            </div>
            <div class="inputs">
                <textarea name="your_query" cols="40" rows="5"></textarea>
            </div>
            <br>
            <br>
            <div class="labels">
                <label>Appoinment<br>Type</label>
            </div>
            <div class="inputs">
                <label>Select which appoinment type(s) you require</label>
                <br>
                <input type="checkbox" name="appoinment_type" value="Cervix checkup" checked>
                <span>Cervix checkup</span>
                <br>
                <input type="checkbox" name="appoinment_type" value="Heart checkup" checked>
                <span>Heart checkup</span>
                <br>
                <input type="checkbox" name="appoinment_type" value="Eye check-up">
                <span>Eye check-up</span>
                <br>
                <input type="checkbox" name="appoinment_type" value="Hearing Test">
                <span>Hearing Test</span>
                <br>
                <br>
                <button type="submit">send</button>
            </div>
        </form>
    </div>
</body>
</html>
